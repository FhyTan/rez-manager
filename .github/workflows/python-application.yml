name: Python application

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests
        run: uv run pytest

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: test
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Build executable
        run: uv run pyinstaller --name rez-manager --windowed -y --clean --icon
          ./src/rez_manager/resources/icons/logo/rez_manager.ico
          ./src/rez_manager/__main__.py

      - name: Archive release bundle
        shell: pwsh
        run: |
          $archiveName = "rez-manager-${{ github.ref_name }}-windows.zip"
          Compress-Archive -Path "dist/rez-manager/*" -DestinationPath $archiveName -Force

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: rez-manager-${{ github.ref_name }}-windows.zip
